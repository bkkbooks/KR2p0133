body:
  text: 散見簡牘合輯江蘇連雲港市花果山竹木間牘榮成里徐談十月十四日甲辰以刀刺西長里孫宣利桑朱宣梁里徐竪十月十七日丁未賣刀刃共傷何十八永昌里朱毋十一月二日人侍刀刃傷滿里徐二知何人十一月六日乙丑夕以刃傷利成里孫子游賴頭強盜所毋長子皂衣一策十七俞君孫皂衣錢五十鄉錢百一十并直三千四百聞武坊未然而道幸會大賞請猥毆苦至自殺所疑有起居而猶毆之令長相對曰大邦新至巳曰聞者卒卒縣賦未府曰犯至不曰吏驗事不人良民盜賊大已以宿過年死入聞尉摘捕望功竝仄曰多盡十一月盜賊文明漏行遣故鄉里長吏門賦犯酒行求家法有大門昌里長有人輸府五人輸下邳十人盜人十月辛卯朔十一月庚申朔十二月庚寅朔正月己未二月己丑三月丁未十七日戊申十八日己酉十九日庚戌草日辛亥草一日壬子草二日癸丑草三日甲寅草四日月壬辰二日癸巳三日年日亥甲午四日乙未五日未丙申六日寅丁酉七日戊戌八日月壬史隨十日十人買鈺子二千前民千七二千五門三百千二再拜千大八月市每八百賣東君妖傷游什十小人賣酒三斤豫也斤八二計錢一
